
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <script>
        // Handle SPA redirect from 404.html (spa-github-pages)
        (function(l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function(s) {
              return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
            );
          }
        }(window.location));
      </script>
      <meta
        name="description"
        content="Algoryn Fabric is an open source ecosystem of infrastructure tools for Go startups, starting with Pulse for load testing and chaos engineering."
      />
      <title>Algoryn Fabric</title>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
